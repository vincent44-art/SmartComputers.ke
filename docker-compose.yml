services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartcomputers
      POSTGRES_PASSWORD: smartcomputers
      POSTGRES_DB: smartcomputers
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcomputers"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://smartcomputers:smartcomputers@db:5432/smartcomputers
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CORS_ORIGINS: http://localhost
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A celery_app.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://smartcomputers:smartcomputers@db:5432/smartcomputers
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    environment:
      API_PROXY_TARGET: http://backend:5000
      NEXT_PUBLIC_SITE_URL: http://localhost
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
